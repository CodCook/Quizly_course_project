<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizly — AI Study Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=4" />
  </head>
  <body>
    <div class="background-glow glow-a"></div>
    <div class="background-glow glow-b"></div>

    <div class="container">
      <header class="header reveal delay-0-5">
        <div class="logo">
          <h1>Quizly</h1>
          <span class="badge">beta</span>
        </div>
        <p class="tagline">Supercharge your study sessions with AI.</p>
      </header>

      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Analyzing document...</p>
      </div>

      <section class="upload-panel reveal delay-1">
        <div class="drop-zone" id="drop-zone">
          <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p class="upload-text">Drag and drop your PDF, DOCX, or PPTX file here</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.ppt,.pptx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" hidden />
          <button class="button solid" id="browse-button" type="button">Or browse files</button>
        </div>
        <div id="post-upload-actions" class="post-upload-actions hidden"></div>
      </section>

      <section class="quiz-topic-panel reveal delay-1-5">
        <h2>Quick Quiz by Topic</h2>
        <div class="topic-input-group">
          <input type="text" id="topic-input" placeholder="Enter a topic (e.g. 'Photosynthesis', 'FastAPI', 'Civil War')..." class="topic-input" />
          <button class="button solid" id="generate-quiz-btn" type="button">Generate Quiz</button>
        </div>
        <div id="quiz-result-container" class="quiz-result-container hidden"></div>
      </section>

      <section class="history-panel reveal delay-2">
        <div class="panel-header">
          <h2>Study History</h2>
          <button class="button outline small" id="refresh-history-btn" type="button">
            Refresh
          </button>
        </div>
        <div class="history-list" id="history-container">
          <!-- History items will be injected here via JS -->
        </div>
      </section>
    </div>

    <!-- Modal for showing results -->
    <div id="result-modal" class="modal hidden">
      <div class="modal-content">
        <button class="close-button" id="close-modal">&times;</button>
        <h2 id="modal-title">Study Session</h2>
        <div class="tabs">
          <button class="tab-button active" data-target="tab-summary">Summary</button>
          <button class="tab-button" data-target="tab-quiz">Quiz</button>
          <button class="tab-button" data-target="tab-flashcards">Flashcards</button>
        </div>
        
        <div class="tab-content active" id="tab-summary"></div>
        <div class="tab-content" id="tab-quiz"></div>
        <div class="tab-content" id="tab-flashcards"></div>
      </div>
    </div>

    <script src="/static/app.js?v=4"></script>
  </body>
</html>
