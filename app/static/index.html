<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizly | Study Smarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=5" />
  </head>
  <body>
    <div class="background-glow glow-a"></div>
    <div class="background-glow glow-b"></div>

    <main class="page-shell">
      <header class="app-header reveal">
        <h1>Quizly</h1>
        <p class="tagline">Turn your notes into summaries, quizzes, and flashcards</p>
      </header>

      <section class="upload-panel reveal delay-1">
        <h2>Upload Your Notes</h2>
        <div class="upload-dropzone" id="dropzone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p class="upload-text">Drag and drop your PDF, DOCX, or PPTX file here</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.ppt,.pptx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" hidden />
          <button class="button solid" id="browse-button" type="button">Or browse files</button>
        </div>
        <div id="post-upload-actions" class="post-upload-actions hidden"></div>
      </section>


      <section class="history-panel reveal delay-2">
        <div class="panel-header">
          <h2>Recent Study History</h2>
          <button class="button tiny" id="reload-history" type="button">Reload</button>
        </div>
        <ul id="history-list" class="history-list">
          <li class="history-empty">Loading history...</li>
        </ul>
      </section>
    </main>
    
    <div id="quiz-modal" class="quiz-modal hidden">
      <div class="modal-content reveal">
        <div class="modal-header">
          <h3 id="quiz-title">Quiz: Topic Name</h3>
          <button class="close-btn" id="close-quiz-btn">&times;</button>
        </div>
        <div id="quiz-body" class="quiz-body">
          <!-- Quiz content injected here -->
        </div>
        <div class="modal-footer">
          <p id="quiz-progress" class="quiz-progress">Question 1 of 5</p>
          <button class="button solid" id="submit-quiz-btn">Submit Quiz</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js?v=5"></script>
  </body>
</html>
