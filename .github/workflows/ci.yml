name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - feature/**
      - docs/**
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/codcook/quizly_course_project:latest

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest

  docker-build-and-test:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t quizly-ci:latest .

      - name: Run container
        run: |
          docker run -d --name quizly-ci -p 8000:8000 quizly-ci:latest

      - name: Wait for app to start
        run: |
          for i in {1..20}; do
            if curl -f http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Container did not become healthy in time"
          docker logs quizly-ci
          exit 1

      - name: Smoke test running container
        run: |
          curl -f http://127.0.0.1:8000/health

      - name: Stop container
        if: always()
        run: |
          docker stop quizly-ci || true
          docker rm quizly-ci || true

  push-image:
    runs-on: ubuntu-latest
    needs: docker-build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME